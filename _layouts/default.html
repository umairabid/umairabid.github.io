<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo title=false %}
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <link rel="icon" type="image/png" href="/assets/img/avatar.png">
  <link rel="apple-touch-icon" href="/assets/img/avatar.png">
  {% feed_meta %}
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7YKSG7QGFE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-7YKSG7QGFE');
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-title">Umair Abid</a>
      <span class="nav-links">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/blog/">Blog</a>
        <a href="https://github.com/umairabid" rel="me">GitHub</a>
        <a href="https://www.linkedin.com/in/umairabid" rel="me">LinkedIn</a>
      </span>
    </nav>
  </header>
  <main class="content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>© {{ "now" | date: "%Y" }} Umair Abid</p>
  </footer>
</body>
</html>
