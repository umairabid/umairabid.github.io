---
layout: default
---
<article class="post">
  {% if page.image %}
  <img class="post-cover" src="{{ page.image }}" alt="{{ page.cover_alt | default: page.title }}">
  {% endif %}
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
